name: Website

on:
  pull_request:
    paths:
      - "www/**"
      - ".github/workflows/www.yml"
  push:
    branches: [main]
    paths:
      - "www/**"
      - ".github/workflows/www.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: www
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
